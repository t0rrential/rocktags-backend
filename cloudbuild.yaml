steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '--network=cloudbuild', '-t', 'gcr.io/$PROJECT_ID/rocktags-backend', '.']

  - name: gcr.io/cloud-builders/docker
    args: ['push', 'gcr.io/$PROJECT_ID/rocktags-backend']

images:
  - gcr.io/$PROJECT_ID/rocktags-backend

options:
  logging: CLOUD_LOGGING_ONLY
